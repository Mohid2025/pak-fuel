name: Check for new fuel prices

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4

      - name: Scrape latest prices
        run: python scrape_pso.py

      - name: Commit if prices changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "No price change."
          else
            git commit -m "data: fuel price revision $(date -u +'%Y-%m-%d')"
            git push
          fi
